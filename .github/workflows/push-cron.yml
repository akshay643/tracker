name: push-reminders-cron

# Pings the app's cron endpoint frequently so reminders are delivered even when
# the PWA is closed — without needing a Vercel Pro plan (Hobby crons run only
# once/day). GitHub's scheduler fires roughly every 5 min (can be delayed under
# load). Also runnable manually via "Run workflow".

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder delivery
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://tracker-two-sand.vercel.app/api/push/cron
